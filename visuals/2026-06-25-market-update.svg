    <text x="105" y="725" font-size="21" font-weight="650" fill="#FFF4C7">• ความผันผวนสูงและแรงขายที่เกิดขึ้นกับหุ้นบางตัวในช่วงเวลาทำการปกติ อาจบ่งชี้ถึงความไม่แน่นอนของตลาด</text>
<text x="105" y="759" font-size="21" font-weight="650" fill="#FFF4C7">• การปรับตัวขึ้นอย่างรุนแรงในบางกลุ่มหุ้นโดยเฉพาะนอกเวลาทำการ อาจเกิดจากปัจจัยเฉพาะกิจที่ต้องพิจารณาอย่างรอบคอบ</text>

    
    <rect x="725" y="630" width="645" height="210" rx="26" fill="url(#panelGrad)" stroke="#FF78A6" stroke-width="4"/>
    <rect x="727" y="632" width="641" height="70" rx="24" fill="rgba(5,18,46,0.72)"/>
    <text x="753" y="677" font-size="32" font-weight="900" fill="#FFFFFF">WATCH NEXT</text>
    
    <text x="760" y="725" font-size="21" font-weight="650" fill="#FFE4EF">• ติดตามการเคลื่อนไหวของกลุ่มเทคโนโลยีและเซมิคอนดักเตอร์อย่างใกล้ชิด โดยเฉพาะหลังการปรับตัวขึ้นแรง</text>
<text x="760" y="759" font-size="21" font-weight="650" fill="#FFE4EF">• พิจารณาความแตกต่างของการเคลื่อนไหวระหว่างช่วงเวลาทำการปกติและนอกเวลาทำการ เพื่อประกอบการประเมินสถานการณ์</text>
<text x="760" y="793" font-size="21" font-weight="650" fill="#FFE4EF">• เฝ้าระวังหุ้นที่มีการปรับตัวลงแรงในเวลาทำการปกติ เพื่อดูว่ามีปัจจัยเฉพาะตัวที่ส่งผลกระทบหรือไม่</text>
