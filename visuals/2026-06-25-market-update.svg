    <text x="105" y="390" font-size="29" font-weight="900" fill="#FFFFFF">ตลาดหุ้นผันผวน:</text>
<text x="105" y="428" font-size="29" font-weight="900" fill="#FFFFFF">หุ้นกลุ่มเทคฯ/เซมิคอนดักเตอร์พุ่งแรงนอกเวลาทำการ</text>
    <text x="105" y="465" font-size="22" font-weight="650" fill="#DDFBFF">• ค่าเฉลี่ยการเคลื่อนไหวของตลาดในช่วงเวลาทำการปกติอยู่ที่ -2.10% ขณะที่นอกเวลาทำการอยู่ที่ +4.12%</text>
<text x="105" y="499" font-size="22" font-weight="650" fill="#DDFBFF">• หุ้นกลุ่มเซมิคอนดักเตอร์และเทคโนโลยีปรับตัวขึ้นแรงในการซื้อขายนอกเวลาทำการ เช่น MU (+15.78%), DRAM (+14.64%) และ SNDK (+12.3%)</text>
<text x="105" y="533" font-size="22" font-weight="650" fill="#DDFBFF">• หุ้น RKLB (-10.21%), IREN (-8.08%) และ ASTS (-6.67%) เป็นกลุ่มที่ปรับตัวลงแรงที่สุดในช่วงเวลาทำการปกติ</text>
<text x="105" y="567" font-size="22" font-weight="650" fill="#DDFBFF">• หุ้นเทคฯ ขนาดใหญ่อย่าง GOOG และ AAPL มีการเคลื่อนไหวลดลงเล็กน้อยในตลาดนอกเวลาทำการ</text>

    
