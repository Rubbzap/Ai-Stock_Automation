name: Daily Stock Brief

on:
  schedule:
    # 09:00 Asia/Bangkok = 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate stock brief
        run: python scripts/generate_stock_brief.py

      - name: Export reports CSV
        run: python scripts/export_reports_csv.py

      - name: Generate AI summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: python scripts/generate_ai_summary.py

      - name: Generate market visual
        run: python scripts/generate_market_visual.py

      - name: Commit and push report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add stock brief
          file_pattern: reports/*.md data/*.csv visuals/*.svg
